name: usvg_dart
description: Normalize complex, standards-compliant SVG into a simpler form for Dart and Flutter renderers using usvg.
version: 1.0.2
repository: https://github.com/existedinnettw/usvg-dart

false_secrets:
  - /lib/src/web_wasm_assets.dart

environment:
  sdk: ^3.11.4

# Add regular dependencies here.
dependencies:
  ffi: ^2.1.4
  # Generated bindings are committed, so consumers do not run codegen.
  # Keep this range wide enough to coexist with other FRB-based packages.
  flutter_rust_bridge: ^2.12.0
  hooks: ">=1.0.3 <3.0.0"
  meta: ^1.17.0
  native_toolchain_rust: ^1.0.4
  web: ^1.1.1

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
