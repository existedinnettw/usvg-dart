name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PUB_CACHE: ${{ github.workspace }}/.pub-cache

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    defaults:
      run:
        working-directory: usvg-dart

    steps:
      - name: Check out usvg-dart
        uses: actions/checkout@v6
        with:
          path: usvg-dart

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache Dart dependencies
        uses: actions/cache@v5
        with:
          path: ${{ env.PUB_CACHE }}
          key: pub-${{ runner.os }}-${{ hashFiles('usvg-dart/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1
          components: rustfmt

      - name: Cache Rust dependencies and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: usvg-dart/rust -> target
          cache-all-crates: true

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 2.12.0 --locked

      - name: Get Dart dependencies
        run: dart pub get

      - name: Run tests
        run: dart test

      - name: Generate Dart bindings
        run: flutter_rust_bridge_codegen generate

      - name: Verify generated bindings are committed
        run: git diff --exit-code -- lib/src/rust rust/src/frb_generated.rs

      - name: Verify publish archive
        if: runner.os == 'Linux'
        run: dart pub publish --dry-run --ignore-warnings

  web:
    name: Web build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: usvg-dart

    steps:
      - name: Check out usvg-dart
        uses: actions/checkout@v6
        with:
          path: usvg-dart

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache Dart dependencies
        uses: actions/cache@v5
        with:
          path: ${{ env.PUB_CACHE }}
          key: pub-${{ runner.os }}-${{ hashFiles('usvg-dart/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Set up nightly Rust for WASM
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-04
          components: rust-src, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies, tools, and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: usvg-dart/rust -> target
          cache-all-crates: true
          key: web

      - name: Install web build tools
        run: |
          cargo install flutter_rust_bridge_codegen --version 2.12.0 --locked
          cargo install wasm-pack --version 0.15.0 --locked

      - name: Get Dart dependencies
        run: dart pub get

      - name: Build WebAssembly library
        run: >-
          flutter_rust_bridge_codegen build-web --release
          --wasm-pack-rustup-toolchain nightly-2026-06-04

      - name: Verify web build artifacts
        run: |
          test -f web/pkg/usvg_dart_rust.js
          test -f web/pkg/usvg_dart_rust_bg.wasm
