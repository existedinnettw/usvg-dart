name: Publish to pub.dev

on:
  release:
    types:
      - published
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/publish.yml"

permissions:
  contents: read

jobs:
  dispatch:
    name: Dispatch publish at release tag
    if: github.event_name == 'release'
    permissions:
      actions: write
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must be valid SemVer prefixed with v."
            exit 1
          fi
          gh workflow run publish.yml --ref "$TAG"

  validate-dispatch:
    name: Validate publish dispatch
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Check out package
        uses: actions/checkout@v6

      - name: Verify tag and package version
        env:
          REF_TYPE: ${{ github.ref_type }}
          TAG: ${{ github.ref_name }}
        run: |
          if [[ "$REF_TYPE" != "tag" ]]; then
            echo "::error::Publish workflow must be dispatched at a tag."
            exit 1
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must be valid SemVer prefixed with v."
            exit 1
          fi

          package_version=$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml)
          if [[ "v$package_version" != "$TAG" ]]; then
            echo "::error::Release tag $TAG does not match pubspec version $package_version."
            exit 1
          fi

  publish:
    name: Publish to pub.dev
    if: github.event_name == 'workflow_dispatch'
    needs: validate-dispatch
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1

  validate:
    name: Validate publish workflow
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out package
        uses: actions/checkout@v6

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Validate package
        run: dart pub publish --dry-run
