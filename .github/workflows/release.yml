name: Create draft release

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/release.yml"

permissions:
  contents: read

jobs:
  validate:
    name: Validate release workflow
    runs-on: ubuntu-latest

    steps:
      - name: Validate tag handling
        run: |
          for tag in v1.2.3 v0.2.1-alpha.4; do
            if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::Expected valid release tag: $tag"
              exit 1
            fi
          done

          invalid_tag=not-a-release
          if [[ "$invalid_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Expected invalid release tag: $invalid_tag"
            exit 1
          fi

  release:
    name: Create draft release
    if: github.event_name == 'push'
    needs: validate
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Validate release tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must be valid SemVer prefixed with v."
            exit 1
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          args=("$TAG" --draft --generate-notes --verify-tag)
          if [[ "$TAG" == *-* ]]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}" --repo "$REPOSITORY"
